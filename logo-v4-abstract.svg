<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 几何抽象: 爽字的抽象 + xca -->
  <rect width="200" height="200" fill="#0f172a"/>
  
  <g transform="translate(100, 100)">
    <!-- 四个叉，暗示"爽"字的四个 x -->
    <g stroke="#e2e8f0" stroke-width="3" stroke-linecap="round">
      <!-- 左上 -->
      <line x1="-35" y1="-35" x2="-20" y2="-20"/>
      <line x1="-20" y1="-35" x2="-35" y2="-20"/>
      <!-- 右上 -->
      <line x1="20" y1="-35" x2="35" y2="-20"/>
      <line x1="35" y1="-35" x2="20" y2="-20"/>
      <!-- 左下 -->
      <line x1="-35" y1="20" x2="-20" y2="35"/>
      <line x1="-20" y1="20" x2="-35" y2="35"/>
      <!-- 右下 -->
      <line x1="20" y1="20" x2="35" y2="35"/>
      <line x1="35" y1="20" x2="20" y2="35"/>
    </g>
    
    <!-- 中心 ca -->
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="24" fill="#94a3b8">ca</text>
  </g>
</svg>