<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 方言概念: x → ca 的变形 -->
  <rect width="200" height="200" fill="#fafafa"/>
  
  <!-- 中心图形：x 与 c 的融合 -->
  <g transform="translate(100, 100)">
    <!-- 外圆：代表"口音"的共鸣 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    
    <!-- x 变形为 ca -->
    <!-- 左侧：x 的左半边 + c 的开口 -->
    <path d="M -25 -20 L -5 0 L -25 20" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 右侧：x 的右半边 + a 的圆圈 -->
    <circle cx="15" cy="0" r="12" fill="none" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="25" y1="-15" x2="25" y2="12" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 连接线：暗示变形过程 -->
    <path d="M -5 0 Q 5 0 15 0" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  </g>
  
  <!-- 底部小字 -->
  <text x="100" y="185" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">xca</text>
</svg>